name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: |
          chmod +x ./mvnw
          ./mvnw test -q

  # ── 2. Deploy JAR to Hetzner ─────────────────────────────────────────────────
  # Runs only on push to main (not on pull requests, not on tags).
  #
  # Required GitHub Secrets (Settings → Secrets → Actions):
  #   DEPLOY_SSH_KEY      — private key content (cat ~/.ssh/hetzner_edu)
  #   DEPLOY_KNOWN_HOSTS  — ssh-keyscan output  (ssh-keyscan -H 65.108.147.48)
  deploy:
    name: Deploy to Hetzner
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests -q

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Copy JAR to server
        run: |
          scp -i ~/.ssh/deploy_key \
            target/elearning-backend-0.0.1-SNAPSHOT.jar \
            deploy@65.108.147.48:/opt/edu-api/app.jar

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key deploy@65.108.147.48 \
            "sudo systemctl restart edu-api && sudo systemctl status edu-api --no-pager -l"

  # ── 3. Build Docker image & push to GHCR ────────────────────────────────────
  # Kept for image versioning. Runs on push to main and version tags.
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
