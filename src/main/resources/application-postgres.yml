spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/elearning}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Add org.postgresql:postgresql as a runtime dependency before using this profile.
