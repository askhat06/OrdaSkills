spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: ${POSTGRES_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    show-sql: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    kz.skills.elearning: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

app:
  cors:
    allowed-origins:
      - https://oyan.ink
      - https://www.oyan.ink
      - http://localhost:3000
      - http://localhost:5173
  media:
    video:
      provider: s3
      bucket: ${APP_MEDIA_VIDEO_BUCKET}
      endpoint: ${APP_MEDIA_VIDEO_ENDPOINT}
      public-base-url: ${APP_MEDIA_VIDEO_PUBLIC_BASE_URL}
      access-key: ${APP_MEDIA_VIDEO_ACCESS_KEY}
      secret-key: ${APP_MEDIA_VIDEO_SECRET_KEY}
      region: ${APP_MEDIA_VIDEO_REGION:us-east-1}
      lesson-prefix: ${APP_MEDIA_VIDEO_LESSON_PREFIX:lessons}
      max-file-size-bytes: ${APP_MEDIA_VIDEO_MAX_FILE_SIZE_BYTES:536870912}
      allowed-content-types:
        - video/mp4
        - video/webm
      presign-duration: ${APP_MEDIA_VIDEO_PRESIGN_DURATION:2h}
      path-style-access-enabled: ${APP_MEDIA_VIDEO_PATH_STYLE_ACCESS_ENABLED:true}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}