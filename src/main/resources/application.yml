spring:
  application:
    name: elearning-backend
  profiles:
    default: local
    group:
      prod: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:7777}

app:
  mail:
    provider: ${APP_MAIL_PROVIDER:log}
    from: ${APP_MAIL_FROM:no-reply@ordaskills.local}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  security:
    jwt:
      expiration: 24h
    email-verification:
      token-ttl: ${APP_SECURITY_EMAIL_VERIFICATION_TOKEN_TTL:24h}
      verification-url-base: ${APP_SECURITY_EMAIL_VERIFICATION_URL_BASE:http://localhost:7777/api/auth/verify-email}
    rate-limit:
      enabled: true
      window: 1m
      login-max-requests: 5
      register-max-requests: 3
      enrollment-max-requests: 10
      resend-verification-max-requests: 3
