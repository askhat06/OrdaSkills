spring:
  application:
    name: elearning-backend
  profiles:
    default: postgres
    group:
      prod: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 7777

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  security:
    jwt:
      expiration: 24h
    rate-limit:
      enabled: true
      window: 1m
      login-max-requests: 5
      register-max-requests: 3
      enrollment-max-requests: 10
      verify-max-requests: 20
  email:
    verification-enabled: true
    base-url: ${APP_BASE_URL:http://localhost:5173}
    from-name: ${MAIL_FROM_NAME:Oyan Platform}
    token-expiry-hours: ${EMAIL_TOKEN_EXPIRY:24}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}