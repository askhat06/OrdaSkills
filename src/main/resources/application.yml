spring:
  application:
    name: elearning-backend
  profiles:
    default: local
    group:
      prod: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 7777

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  security:
    jwt:
      expiration: 24h
    rate-limit:
      enabled: true
      window: 1m
      login-max-requests: 5
      register-max-requests: 3
      enrollment-max-requests: 10
