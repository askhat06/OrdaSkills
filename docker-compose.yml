services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: elearning
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d elearning"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${APP_MEDIA_VIDEO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${APP_MEDIA_VIDEO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initializer (runs once, then exits) ───────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${APP_MEDIA_VIDEO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${APP_MEDIA_VIDEO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${APP_MEDIA_VIDEO_BUCKET:-elearning-videos}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET} &&
        mc anonymous set download local/$${MINIO_BUCKET} &&
        echo 'Bucket $${MINIO_BUCKET} is ready.'
      "

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_URL: jdbc:postgresql://db:5432/elearning
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET}
      APP_MEDIA_VIDEO_BUCKET: ${APP_MEDIA_VIDEO_BUCKET:-elearning-videos}
      APP_MEDIA_VIDEO_ENDPOINT: http://minio:9000
      APP_MEDIA_VIDEO_PUBLIC_BASE_URL: ${APP_MEDIA_VIDEO_PUBLIC_BASE_URL:-http://localhost:9000/elearning-videos}
      APP_MEDIA_VIDEO_ACCESS_KEY: ${APP_MEDIA_VIDEO_ACCESS_KEY:-minioadmin}
      APP_MEDIA_VIDEO_SECRET_KEY: ${APP_MEDIA_VIDEO_SECRET_KEY:-minioadmin}
      APP_MEDIA_VIDEO_REGION: us-east-1
      APP_MEDIA_VIDEO_PATH_STYLE_ACCESS_ENABLED: "true"
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "7777:7777"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7777/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pg_data:
  minio_data:
